apiVersion: v1
kind: ServiceAccount
metadata:
  name: products-sa
  namespace: default
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: orders-sa
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: service-reader
  namespace: default
rules:
- apiGroups: [""]
  resources: ["pods", "services"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: products-binding
  namespace: default
subjects:
- kind: ServiceAccount
  name: products-sa
roleRef:
  kind: Role
  apiGroup: rbac.authorization.k8s.io
  name: service-reader
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: orders-binding
  namespace: default
subjects:
- kind: ServiceAccount
  name: orders-sa
roleRef:
  kind: Role
  apiGroup: rbac.authorization.k8s.io
  name: service-reader